<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAY States Nigeria Population Density Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        .info {
            padding: 10px 15px;
            font: 14px/16px Arial, Helvetica, sans-serif;
            background: white;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            border-radius: 5px;
        }
        .info h4 { margin: 0 0 5px; color: #777; }

        .legend {
            line-height: 18px;
            color: #555;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .legend i {
            width: 18px;
            height: 18px;
            float: left;
            margin-right: 8px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="info" style="position: absolute; top: 10px; left: 50px; z-index: 1000;">
        <h2 style="margin:0">BAY States Population Density Dashboard</h2>
        <div id="stats">Displaying Adamawa, Borno, and Yobe</div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', {
            center: [11.5, 13.0],
            zoom: 7,
            minZoom: 6,
            maxBounds: [[7.0, 10.0], [14.0, 16.0]]
        });

        L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Control to show info on hover
        const info = L.control();

        info.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };

        info.update = function (props) {
            this._div.innerHTML = '<h4>Population Density (People/sq km)</h4>' +  (props ?
                '<b>' + props.NAME_2 + ' (' + props.NAME_1 + ')</b><br />' + 
                'Density: ' + Math.round(props.population_density) + ' people / mi<sup>2</sup><br />' +
                'Total Pop: ' + props.Total_Population_2022_Projection.toLocaleString() + '<br />' +
                'Area: ' + Math.round(props.area_sqkm).toLocaleString() + ' sq km<br />' +
                'School-Age Pop: ' + Math.round(props.Estimated_School_Age_Pop_5_17).toLocaleString() + '<br />' +
                'Out-of-School Est: ' + Math.round(props.Estimated_Out_of_School_Children).toLocaleString()
                : 'Hover over a BAY State LGA');
        };

        info.addTo(map);

        // Color scale for density
        function getColor(d) {
            return d > 500 ? '#800026' :
                   d > 200 ? '#BD0026' :
                   d > 100 ? '#E31A1C' :
                   d > 50  ? '#FC4E2A' :
                   d > 20  ? '#FD8D3C' :
                   d > 10  ? '#FEB24C' :
                   d > 5   ? '#FED976' :
                             '#FFEDA0';
        }

        function style(feature) {
            return {
                fillColor: getColor(feature.properties.population_density),
                weight: 2,
                opacity: 1,
                color: 'white',
                dashArray: '3',
                fillOpacity: 0.7
            };
        }

        function highlightFeature(e) {
            const layer = e.target;
            layer.setStyle({
                weight: 5,
                color: '#666',
                dashArray: '',
                fillOpacity: 0.7
            });
            layer.bringToFront();
            info.update(layer.feature.properties);
        }

        function resetHighlight(e) {
            geojson.resetStyle(e.target);
            info.update();
        }

        function onEachFeature(feature, layer) {
            layer.on({
                mouseover: highlightFeature,
                mouseout: resetHighlight
            });
        }

        let geojson;

        // Fetch the generated GeoJSON
        fetch('../data/clean/north_east_density.geojson')
            .then(res => res.json())
            .then(data => {
                geojson = L.geoJson(data, {
                    style: style,
                    onEachFeature: onEachFeature
                }).addTo(map);
            });

        // Legend
        const legend = L.control({position: 'bottomright'});

        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'info legend');
            const grades = [0, 5, 10, 20, 50, 100, 200, 500];
            const labels = [];

            div.innerHTML = '<h4>Density</h4>';
            for (let i = 0; i < grades.length; i++) {
                div.innerHTML +=
                    '<i style="background:' + getColor(grades[i] + 1) + '"></i> ' +
                    grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
            }
            return div;
        };

        legend.addTo(map);
    </script>
</body>
</html>
